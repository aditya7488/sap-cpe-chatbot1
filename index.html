<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAP CPE Learning Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<!-- ✅ YOUR ORIGINAL STYLES (UNCHANGED) -->
<style>
/* KEEPING YOUR FULL CSS SAME */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f2;
  --surface:#ffffff;
  --border:#e4e2db;
  --border2:#d0cec5;
  --text:#1a1916;
  --text2:#6b6860;
  --text3:#9e9b94;
  --accent:#c85c2a;
  --accent-light:#fdf1ec;
  --user-bg:#1a1916;
  --user-text:#f7f6f2;
  --mono:'DM Mono',monospace;
  --sans:'DM Sans',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{display:flex;align-items:center;gap:14px;padding:14px 20px;background:var(--surface);border-bottom:1px solid var(--border)}
.logo{width:38px;height:38px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff}
#chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
.msg{display:flex;gap:10px}
.msg.user{flex-direction:row-reverse}
.av{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px}
.av.bot{background:var(--accent);color:#fff}
.av.user{background:var(--user-bg);color:#fff}
.bub{padding:11px 15px;border-radius:10px;font-size:13px;line-height:1.7}
.msg.user .bub{background:var(--user-bg);color:var(--user-text)}
.msg.bot .bub{background:#fff;border:1px solid var(--border)}
.input-wrap{padding:14px;background:#fff;border-top:1px solid var(--border)}
#inp{width:80%;padding:10px}
#send{padding:10px;background:var(--accent);color:#fff;border:none}
</style>
</head>

<body>

<header>
  <div class="logo">CPE</div>
  <h3>SAP CPE Learning Assistant</h3>
</header>

<div id="chat"></div>

<div class="input-wrap">
  <input id="inp" placeholder="Ask about SAP CPE...">
  <button id="send" onclick="send()">Send</button>
</div>

<script>
const chat = document.getElementById('chat');
const inp = document.getElementById('inp');
const sendBtn = document.getElementById('send');

let busy = false;

function addMsg(role, text){
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.innerHTML = `
    <div class="av ${role}">${role === 'bot' ? 'CPE' : 'You'}</div>
    <div class="bub">${text}</div>
  `;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

async function send(){
  const text = inp.value.trim();
  if(!text || busy) return;

  busy = true;
  sendBtn.disabled = true;

  inp.value = "";
  addMsg('user', text);

  try{
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text
      })
    });

    const data = await res.json();

    if(!res.ok){
      throw new Error(data.error || "API Error");
    }

    addMsg('bot', data.reply);

  }catch(e){
    addMsg('bot', "Error: " + e.message);
  }

  busy = false;
  sendBtn.disabled = false;
  inp.focus();
}
</script>

</body>
</html>
