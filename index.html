<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAP CPE Chatbot</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 20px;
}

#chat {
  margin-top: 20px;
  max-width: 600px;
}

.msg {
  margin-bottom: 10px;
}

.user {
  font-weight: bold;
}

.bot {
  color: green;
}
</style>
</head>

<body>

<h2>SAP CPE Chatbot</h2>

<input id="inp" placeholder="Ask something..." style="width:300px;">
<button onclick="send()">Send</button>

<div id="chat"></div>

<script>
const chat = document.getElementById("chat");
const inp = document.getElementById("inp");

let busy = false;

function addMessage(role, text) {
  const div = document.createElement("div");
  div.className = "msg";
  div.innerHTML = role === "user"
    ? "<span class='user'>You:</span> " + text
    : "<span class='bot'>Bot:</span> " + text;

  chat.appendChild(div);
}

async function send() {
  const text = inp.value.trim();
  if (!text || busy) return;

  busy = true;

  addMessage("user", text);
  inp.value = "";

  try {
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: text
      })
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error || "API Error");
    }

    addMessage("bot", data.reply);

  } catch (error) {
    addMessage("bot", "Error: " + error.message);
  }

  busy = false;
}
</script>

</body>
</html>
